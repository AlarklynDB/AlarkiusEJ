name = "alarkiusej-site"
main = "worker.js"
compatibility_date = "2026-05-16"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
# Astro is an MPA now (not a React Router SPA). Serve the real 404 page for
# unmatched assets; the worker turns dead HTML navigations into a 301 -> "/".
not_found_handling = "404-page"
